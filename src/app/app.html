<nav class="navbar">
  <span class="navbar-title">Task App</span>

  <div class="navbar-links">
    <a routerLink="/home" routerLinkActive="active">Home</a>
    <a routerLink="/my-tasks" routerLinkActive="active">My Tasks</a>
    <a routerLink="/search" routerLinkActive="active">Search</a>

    @if (authService.isLoggedIn) {
      <span class="navbar-user">{{ authService.currentUser()?.username }}</span>
      <button class="logout-btn" (click)="authService.logout()">Logout</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Login</a>
    }
  </div>
</nav>

<router-outlet />
