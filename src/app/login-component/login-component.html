<div class="login-container">
  @if (!isRegisterMode) {
    <form class="login-form" (ngSubmit)="authenticate()">
      <h2>Login</h2>

      <label for="login-email">Email</label>
      <input
        id="login-email"
        name="email"
        type="email"
        [(ngModel)]="loginData.email"
        required
      />

      <label for="login-password">Password</label>
      <input
        id="login-password"
        name="password"
        type="password"
        [(ngModel)]="loginData.password"
        required
      />

      <div class="form-buttons">
        <button
          type="button"
          (click)="showRegisterForm()"
        >
          Register
        </button>

        <button type="submit">
          Authenticate
        </button>
      </div>
    </form>
  } @else {
    <form class="login-form" (ngSubmit)="register()">
      <h2>Register</h2>

      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        [(ngModel)]="registerData.username"
        required
      />

      <label for="birthDate">Birth date</label>
      <input
        id="birthDate"
        name="birthDate"
        type="date"
        [(ngModel)]="registerData.birthDate"
        required
      />

      <label for="register-email">Email</label>
      <input
        id="register-email"
        name="email"
        type="email"
        [(ngModel)]="registerData.email"
        required
      />

      <label for="register-password">Password</label>
      <input
        id="register-password"
        name="password"
        type="password"
        [(ngModel)]="registerData.password"
        required
      />

      <div class="form-buttons">
        <button
          type="button"
          (click)="showLoginForm()"
        >
          Back to login
        </button>

        <button type="submit">
          Register
        </button>
      </div>
    </form>
  }

  @if (errorMessage) {
    <p class="error-message">
      {{ errorMessage }}
    </p>
  }
</div>
