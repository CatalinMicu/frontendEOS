<h2>My Tasks</h2>

<button type="button" (click)="openNewTask()">New task</button>

<table>
  <thead>
    <tr>
      <th>Due Date</th>
      <th>Subject</th>
      <th>Status</th>
    </tr>
  </thead>

  <tbody>
    @for (task of tasks; track task.taskId) {
      <tr>
        <td>{{ task.dueDate }}</td>
        <td>
          <button class="subject-button" type="button" (click)="openEditTask(task)">
            {{ task.name }}
          </button>
        </td>
        <td>{{ task.statusTypeId }}</td>
      </tr>
    }
  </tbody>
</table>

@if (isModalOpen) {
  <app-new-task
    [task]="selectedTask"
    (save)="saveTask($event)"
    (cancel)="closeModal()"
  />
}
